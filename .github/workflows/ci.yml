name: CI

on:
  push:
    branches: [main, master, swift-historia-main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref to save macOS minutes
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Don't run CI for purely-doc-only changes
permissions:
  contents: read

jobs:
  lint:
    name: Lint (SwiftLint + SwiftFormat)
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode (Xcode 26)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Install lint tooling
        run: |
          brew update >/dev/null
          brew install swiftlint swiftformat

      - name: SwiftFormat (style gate)
        run: swiftformat --swiftversion 6 --lint Apple/

      - name: SwiftLint (semantic gate, strict)
        run: swiftlint lint --strict --config .swiftlint.yml Apple/

  build-macos:
    name: Build (macOS)
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode (Xcode 26)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Resolve Swift packages
        run: |
          xcodebuild \
            -project Apple/PaxHistoriaApple.xcodeproj \
            -resolvePackageDependencies

      - name: Build PaxHistoriaMac
        run: |
          xcodebuild \
            -project Apple/PaxHistoriaApple.xcodeproj \
            -scheme PaxHistoriaMac \
            -configuration Debug \
            -destination 'platform=macOS' \
            -derivedDataPath .build/xcode \
            -skipUnavailableActions \
            build \
            CODE_SIGNING_ALLOWED=NO

  build-ios-simulator:
    name: Build (iOS Simulator)
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode (Xcode 26)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Resolve Swift packages
        run: |
          xcodebuild \
            -project Apple/PaxHistoriaApple.xcodeproj \
            -resolvePackageDependencies

      - name: Build PaxHistoriaiOS
        run: |
          xcodebuild \
            -project Apple/PaxHistoriaApple.xcodeproj \
            -scheme PaxHistoriaiOS \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath .build/xcode \
            -skipUnavailableActions \
            build \
            CODE_SIGNING_ALLOWED=NO

  test:
    name: Unit tests (macOS host)
    runs-on: macos-15
    timeout-minutes: 40
    needs: [build-macos]
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode (Xcode 26)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Test PaxHistoriaMac
        run: |
          xcodebuild \
            -project Apple/PaxHistoriaApple.xcodeproj \
            -scheme PaxHistoriaMac \
            -configuration Debug \
            -destination 'platform=macOS' \
            -derivedDataPath .build/xcode \
            -skipUnavailableActions \
            -enableCodeCoverage YES \
            test \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xccov-report
          path: |
            .build/xcode/Logs/Test/*.xcresult
            .build/xcode/Logs/Test/*.xccovreport
          if-no-files-found: ignore
          retention-days: 14
